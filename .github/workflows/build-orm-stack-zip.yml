name: Build OCI Resource Manager Stack ZIP

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      ZIP_NAME: oci-deploy-selfhosted-mcp-oke-latest.zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build stack ZIP layout
        run: |
          mkdir -p dist/staging/modules
          cp terraform/*.tf dist/staging/
          rm -f dist/staging/provider.tf
          cp -R terraform/modules/* dist/staging/modules/
          cp orm/schema.yaml dist/staging/schema.yaml
          cp orm/provider_orm.tf dist/staging/provider.tf
          (cd dist/staging && zip -r "../${ZIP_NAME}" .)

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: orm-stack-zip
          path: dist/${{ env.ZIP_NAME }}

      - name: Upload ZIP to release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}

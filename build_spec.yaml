version: 0.1
component: build
timeoutInSeconds: 7200
shell: bash

# OCI DevOps reliably resolves top-level build spec paths from hosted repos.
steps:
  - type: Command
    name: BuildServerImage
    command: |
      set -euo pipefail
      echo "Building MCP server image artifact"
      docker build -t mcp-server-build-output:latest mcp-audio

  - type: Command
    name: BuildClientImage
    command: |
      set -euo pipefail
      echo "Building MCP client image artifact"
      docker build -t mcp-client-build-output:latest mcp-client

outputArtifacts:
  - name: mcp-server-image
    type: DOCKER_IMAGE
    location: mcp-server-build-output:latest

  - name: mcp-client-image
    type: DOCKER_IMAGE
    location: mcp-client-build-output:latest

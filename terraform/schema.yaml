title: "Launch MCP Audio + Client on OKE"
description: "Deploy OKE infrastructure for the MCP server and MCP client."
informationalText: "Choose infra_only for infrastructure only, quick_deploy for prebuilt public images, or oci_devops to rebuild from your OCI DevOps repository."
schemaVersion: 1.1.0
version: "1.0"
locale: "en"

variableGroups:
  - title: "Hidden"
    visible: false
    variables:
      - tenancy_ocid
  - title: "Core Configuration"
    variables:
      - compartment_id
      - region
      - home_region
      - cluster_name
      - kubernetes_version
      - resource_name_prefix
  - title: "Repository and Bucket Naming"
    variables:
      - mcp_container_repository_name
      - mcp_client_container_repository_name
      - speech_bucket_name
  - title: "Deployment Mode"
    variables:
      - deployment_mode
      - prebuilt_server_image_uri
      - prebuilt_client_image_uri
      - devops_deploy_namespace
      - devops_server_secret_json
      - devops_client_secret_json
      - genai_model_id
      - genai_provider
      - genai_model_temperature
      - genai_model_max_tokens
      - genai_service_endpoint
  - title: "Advanced OCI DevOps Source Build"
    variables:
      - devops_repository_id
      - devops_repository_url
      - devops_source_branch
      - devops_build_spec_path
      - devops_image_tag
      - current_user_ocid
      - ocir_auth_token
  - title: "Network"
    variables:
      - control_subnet_cidr_block
      - data_subnet_cidr_block
      - load_balancer_subnet_cidr_block

variables:
  compartment_id:
    title: "Compartment"
    description: "Compartment where resources will be created."
    type: "oci:identity:compartment:id"
    required: true
  region:
    title: "Region"
    description: "OCI region where resources are deployed."
    type: string
    required: true
  home_region:
    title: "Tenancy Home Region"
    description: "Optional override for the tenancy home region used by IAM resources. When omitted, Terraform detects it automatically."
    type: string
    required: false
  cluster_name:
    title: "OKE Cluster Name"
    description: "Display name for the OKE cluster."
    type: string
    required: false
  kubernetes_version:
    title: "Kubernetes Version"
    description: "Kubernetes version for the OKE cluster control plane."
    type: string
    required: false
  resource_name_prefix:
    title: "Resource Name Prefix"
    description: "Prefix used to generate repository and bucket names."
    type: string
    required: false
  mcp_container_repository_name:
    title: "Server Repository Base Name"
    description: "Optional base name for the MCP server OCIR repository."
    type: string
    required: false
  mcp_client_container_repository_name:
    title: "Client Repository Base Name"
    description: "Optional base name for the MCP client OCIR repository."
    type: string
    required: false
  speech_bucket_name:
    title: "Speech Bucket Base Name"
    description: "Optional base name for the Speech Object Storage bucket."
    type: string
    required: false
  deployment_mode:
    title: "Deployment Mode"
    description: "infra_only provisions only infrastructure, quick_deploy deploys prebuilt public images, and oci_devops rebuilds from your OCI DevOps repository."
    type: string
    default: "quick_deploy"
    required: false
  prebuilt_server_image_uri:
    title: "Public Server Image"
    description: "Server image used by quick_deploy mode. Ignored in infra_only mode."
    type: string
    default: "ghcr.io/jaydip-aics-oracle/mcp-speech-demo-audio:latest"
    required: false
  prebuilt_client_image_uri:
    title: "Public Client Image"
    description: "Client image used by quick_deploy mode. Ignored in infra_only mode."
    type: string
    default: "ghcr.io/jaydip-aics-oracle/mcp-speech-demo-client:latest"
    required: false
  devops_repository_id:
    title: "OCI DevOps Repository OCID"
    description: "Only for oci_devops mode. OCI DevOps source repository that contains this branch and build spec."
    type: string
    required: false
  devops_repository_url:
    title: "OCI DevOps Repository URL"
    description: "Only for oci_devops mode. Clone URL for the OCI DevOps repository used by the managed build stage."
    type: string
    required: false
  devops_source_branch:
    title: "Source Branch"
    description: "Only for oci_devops mode. Repository branch built by OCI DevOps."
    type: string
    default: "one-click-deployment"
    required: false
  devops_build_spec_path:
    title: "Build Spec Path"
    description: "Only for oci_devops mode. Path from repository root to the OCI DevOps build spec file."
    type: string
    default: "build_spec.yaml"
    required: false
  devops_deploy_namespace:
    title: "Deploy Namespace"
    description: "Kubernetes namespace used for application deployment in quick_deploy and oci_devops modes."
    type: string
    default: "mcp"
    required: false
  devops_image_tag:
    title: "Image Tag"
    description: "Only for oci_devops mode. Container image tag delivered to OCIR and deployed to OKE."
    type: string
    default: "latest"
    required: false
  current_user_ocid:
    title: "Current User OCID"
    description: "Only for oci_devops mode. OCI user OCID used for OCIR token lookup/creation. Not needed for infra_only or quick_deploy."
    type: string
    required: false
  ocir_auth_token:
    title: "OCIR Auth Token"
    description: "Only for oci_devops mode. Fallback token for OCIR push/pull when the current user already has 2 auth tokens."
    type: string
    required: false
  devops_server_secret_json:
    title: "Server Secret JSON"
    description: "Optional JSON object of extra server env vars. Base server runtime envs are auto-populated by the stack. This field is mainly for tuning/overrides."
    type: string
    default: "{\"SPEECH_MODEL_TYPE\":\"WHISPER_LARGE_V3T\",\"SPEECH_LANGUAGE_CODE\":\"auto\",\"SPEECH_WHISPER_PROMPT\":\"This is a customer support conversation.\",\"SPEECH_DIARIZATION_ENABLED\":\"true\"}"
    required: false
  devops_client_secret_json:
    title: "Client Secret JSON"
    description: "Optional JSON object of extra client env vars. Base client runtime envs are auto-populated by the stack. This field is mainly for tuning/overrides."
    type: string
    default: "{\"AGENT_RECURSION_LIMIT\":\"40\",\"AGENT_MAX_CONCURRENCY\":\"8\",\"AGENT_TOOL_RUN_LIMIT\":\"36\"}"
    required: false
  genai_model_id:
    title: "GenAI Model ID"
    description: "Model ID used by the MCP client deployment."
    type: string
    default: "cohere.command-a-03-2025"
    required: false
  genai_provider:
    title: "GenAI Provider"
    description: "Provider string passed to the OCI Generative AI client."
    type: string
    default: "cohere"
    required: false
  genai_model_temperature:
    title: "GenAI Temperature"
    description: "Temperature passed to the OCI Generative AI model."
    type: number
    default: 0.0
    required: false
  genai_model_max_tokens:
    title: "GenAI Max Tokens"
    description: "Maximum output tokens requested from the OCI Generative AI model. Use 4096 or lower for the current default model."
    type: number
    default: 4096
    required: false
  genai_service_endpoint:
    title: "GenAI Service Endpoint"
    description: "Optional regional inference endpoint override."
    type: string
    required: false
  control_subnet_cidr_block:
    title: "Control Subnet CIDR"
    type: string
    required: false
  data_subnet_cidr_block:
    title: "Data Subnet CIDR"
    type: string
    required: false
  load_balancer_subnet_cidr_block:
    title: "Load Balancer Subnet CIDR"
    type: string
    required: false

outputs:
  cluster_id:
    title: "OKE Cluster OCID"
    displayText: "OKE Cluster OCID"
    type: copyableString
    visible: true
  mcp_server_repository_path:
    title: "Server OCIR Path"
    displayText: "MCP Server OCIR Path"
    type: copyableString
    visible: true
  mcp_client_repository_path:
    title: "Client OCIR Path"
    displayText: "MCP Client OCIR Path"
    type: copyableString
    visible: true
  oci_namespace:
    title: "OCI Namespace"
    displayText: "Object Storage Namespace"
    type: copyableString
    visible: true
  speech_bucket_name:
    title: "Speech Bucket Name"
    displayText: "Speech Bucket Name"
    type: copyableString
    visible: true
  deployment_mode:
    title: "Deployment Mode"
    displayText: "Deployment Mode"
    type: copyableString
    visible: true
  devops_project_id:
    title: "OCI DevOps Project OCID"
    displayText: "OCI DevOps Project OCID"
    type: copyableString
    visible: true
  devops_build_pipeline_id:
    title: "Build Pipeline OCID"
    displayText: "Build Pipeline OCID"
    type: copyableString
    visible: true
  devops_deploy_pipeline_id:
    title: "Deploy Pipeline OCID"
    displayText: "Deploy Pipeline OCID"
    type: copyableString
    visible: true
  devops_initial_build_run_id:
    title: "Initial Build Run OCID"
    displayText: "Initial Build Run OCID"
    type: copyableString
    visible: true
  devops_initial_deployment_id:
    title: "Initial Deployment OCID"
    displayText: "Initial Deployment OCID"
    type: copyableString
    visible: true
